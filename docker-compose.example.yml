services:
  drrosa:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env.production
    volumes:
      - drrosa-uploads:/app/backend/uploads
      - drrosa-scanner-inbox:/app/backend/data/scanner-inbox
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  drrosa-uploads:
  drrosa-scanner-inbox:
