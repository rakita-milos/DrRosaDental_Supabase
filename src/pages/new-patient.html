<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novi pacijent - Dr Rosa</title>
  <link rel="stylesheet" href="../styles/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <a class="logo-link" href="index.html" aria-label="Pocetna strana">
          <img src="../assets/logo.svg" alt="Dr Rosa Logo" class="logo" />
        </a>
        <div>
          <p class="eyebrow">Stomatološka ordinacija</p>
          <h1>Dr Rosa Bašić</h1>
        </div>
      </div>
      <nav class="topbar-actions" aria-label="Glavna navigacija">
        <a href="index.html" class="nav-link">Dashboard</a>
        <a href="calendar.html" class="nav-link">Kalendar</a>
        <a href="new-entry.html" class="nav-link">Novi unos</a>
        <a href="new-patient.html" class="nav-link" aria-current="page">Novi pacijent</a>
        <a href="all-records.html" class="nav-link">Evidencija</a>
        <a href="public-booking.html" class="nav-link">Online zakazivanje</a>
        <a id="director-panel-link" href="director-panel.html" class="nav-link" style="display: none;">Direktor panel</a>
        <button id="logout-btn" class="nav-link" type="button">Odjava</button>
      </nav>
    </header>

    <main>
      <section class="form-section">
        <div class="section-header">
          <div>
            <p class="eyebrow">Pacijent</p>
            <h2>Unos novog pacijenta</h2>
          </div>
        </div>

        <form id="patient-form" class="form-card">
          <div class="form-grid">
            <div class="form-group">
              <label for="first-name">Ime</label>
              <input id="first-name" type="text" required />
            </div>
            <div class="form-group">
              <label for="last-name">Prezime</label>
              <input id="last-name" type="text" required />
            </div>
            <div class="form-group">
              <label for="birth-date">Datum rođenja</label>
              <input id="birth-date" type="date" required />
            </div>
            <div class="form-group">
              <label for="gender">Pol</label>
              <select id="gender" required>
                <option value="">Odaberi</option>
                <option value="Muški">Muški</option>
                <option value="Ženski">Ženski</option>
              </select>
            </div>
            <div class="form-group">
              <label for="address">Adresa</label>
              <input id="address" type="text" />
            </div>
            <div class="form-group">
              <label for="phone">Telefon</label>
              <input id="phone" type="tel" />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input id="email" type="email" />
            </div>
            <div class="form-group">
              <label for="emergency-contact">Kontakt u hitnim slučajevima</label>
              <input id="emergency-contact" type="text" />
            </div>
            <div class="form-group full-width">
              <label for="allergies">Alergije</label>
              <textarea id="allergies" rows="3"></textarea>
            </div>
            <div class="form-group full-width">
              <label for="medical-history">Medicinska istorija</label>
              <textarea id="medical-history" rows="3"></textarea>
            </div>
            <div class="form-group full-width">
              <label for="current-medications">Trenutni lekovi</label>
              <textarea id="current-medications" rows="3"></textarea>
            </div>
            <div class="form-group full-width">
              <label for="previous-treatments">Prethodni stomatološki tretmani</label>
              <textarea id="previous-treatments" rows="3"></textarea>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="primary-btn">Sačuvaj pacijenta</button>
            <button type="button" id="cancel-btn" class="secondary-btn">Otkaži</button>
          </div>
        </form>
      </section>
    </main>
  </div>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/new-patient.js"></script>
</body>
</html>
