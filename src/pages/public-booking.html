<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onlajn zakazivanje | Dr Rosa</title>
  <link rel="stylesheet" href="../styles/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <a class="logo-link" href="index.html" aria-label="Početna strana">
          <img src="../assets/logo.svg" alt="Dr Rosa Logo" class="logo" />
        </a>
        <div>
          <p class="eyebrow">Onlajn zakazivanje</p>
          <h1>Zakazivanje termina</h1>
        </div>
      </div>
      <nav class="topbar-actions" aria-label="Navigacija">
        <button id="public-booking-back" class="nav-link" type="button">Nazad</button>
        <a href="index.html" class="nav-link">Kontrolna tabla</a>
        <a href="public-booking.html" class="nav-link" aria-current="page">Onlajn zakazivanje</a>
        <a href="login.html" class="nav-link">Prijava</a>
      </nav>
    </header>

    <main class="form-page">
      <section class="form-card">
        <div class="section-header">
          <div>
            <p class="eyebrow">Pacijent</p>
            <h2>Izaberite slobodan termin</h2>
          </div>
        </div>
        <form id="public-booking-form">
          <div class="input-grid">
            <label>
              Ime
              <input id="booking-first-name" required />
            </label>
            <label>
              Prezime
              <input id="booking-last-name" required />
            </label>
            <label>
              Email
              <input id="booking-email" type="email" />
            </label>
            <label>
              Telefon
              <input id="booking-phone" type="tel" required />
            </label>
            <label>
              Datum
              <input id="booking-date" type="date" required />
            </label>
            <label>
              Doktor
              <select id="booking-doctor" required></select>
            </label>
            <label>
              Postupak
              <select id="booking-procedure" required></select>
            </label>
            <label>
              Slobodan termin
              <select id="booking-slot" required></select>
            </label>
            <label class="full-width">
              Napomena
              <textarea id="booking-notes" rows="3"></textarea>
            </label>
          </div>
          <div id="booking-captcha" class="full-width"></div>
          <div class="form-actions">
            <button class="primary-btn" type="submit">Zakazi termin</button>
            <button class="secondary-btn" id="refresh-slots" type="button">Osveži termine</button>
          </div>
          <p id="booking-message" class="form-alert" role="status"></p>
        </form>
      </section>
    </main>
  </div>

  <script src="../scripts/api.js"></script>
  <script src="../scripts/date-utils.js?v=picker-format-20260708"></script>
  <script src="../scripts/currency-utils.js"></script>
  <script src="../scripts/public-booking.js"></script>
</body>
</html>
